<!DOCTYPE html>
<html>

<head>
    <title>Romeo's Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('about')">About</button>
        <button onclick="showPage('internship')">Internship</button>
        <button onclick="showPage('projects')">Projects</button>
        <button onclick="showPage('learnings')">Learnings</button>
        <button onclick="showPage('contact')">Contact</button>
    </nav>

    <!-- HOME -->
    <section id="home" class="page">
        <h1>Romeo's Portfolio</h1>
        <p>Student from Paris.</p>
    </section>

    <!-- ABOUT -->
    <section id="about" class="page hidden">
        <h1>About Me</h1>
        <p>Write your profile here.</p>
    </section>

    <!-- INTERNSHIP -->
    <section id="internship" class="page hidden">
        <h1>Internship</h1>
        <p>Internship info here.</p>
    </section>

    <!-- PROJECTS -->
    <section id="projects" class="page hidden">
        <h1>Projects</h1>
        <p>Projects here.</p>
    </section>

    <!-- LEARNINGS -->
    <section id="learnings" class="page hidden">
        <h1>Learnings</h1>
        <p>Things I learned here.</p>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="page hidden">
        <h1>Contact</h1>
        <p>Email: rockoy0218@gmail.com</p>
    </section>

    <script>
        function showPage(pageId) {
            let pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.add('hidden'));

            document.getElementById(pageId).classList.remove('hidden');
        }
    </script>

</body>
</html>
